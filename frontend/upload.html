<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostOffice - Upload</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="index.html">POSTOFFICE</a>
      <div class="nav-actions">
        <a class="btn btn-ghost" href="index.html">Home</a>
        <a class="btn btn-ghost" href="open-link.html">Open Link</a>
      </div>
    </nav>
  </header>

  <main class="section container reveal auth-page">
    <h2>UPLOAD FILE</h2>
    <p class="section-copy">Drop a file and send it to your backend upload endpoint.</p>

    <form class="auth-card" id="upload-form" action="#" method="post" enctype="multipart/form-data">
      <label for="file">Choose File</label>
      <div class="file-picker">
        <input class="file-input" id="file" name="file" type="file" required>
        <label class="file-trigger" for="file">Choose File</label>
        <span class="file-name" id="file-name">No file selected</span>
      </div>

      <label for="uploadedBy">Uploader Name (Optional)</label>
      <input id="uploadedBy" name="uploadedBy" type="text" placeholder="Gourav Meena">

      <label for="expiryAt" class="meta-label">
        <span class="meta-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
            <rect x="3" y="4" width="18" height="17"></rect>
            <path d="M8 2v4M16 2v4M3 10h18"></path>
          </svg>
        </span>
        Expiry Date & Time
      </label>
      <div class="preset-row" role="group" aria-label="Expiry presets">
        <button class="preset-btn active" type="button" data-hours="24">24H</button>
        <button class="preset-btn" type="button" data-hours="168">7D</button>
        <button class="preset-btn" type="button" data-hours="720">30D</button>
        <button class="preset-btn" type="button" data-custom="true">CUSTOM</button>
      </div>
      <div class="expiry-grid">
        <input id="expiryAt" type="datetime-local" required>
        <select id="timezone" name="timezone" aria-label="Timezone">
          <option value="+00:00">UTC</option>
          <option value="+05:30">Asia/Kolkata (UTC+05:30)</option>
          <option value="-04:00">America/New_York (UTC-04:00)</option>
          <option value="+01:00">Europe/London (UTC+01:00)</option>
        </select>
      </div>

      <label for="password" class="meta-label">
        <span class="meta-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
            <rect x="4" y="11" width="16" height="10"></rect>
            <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
          </svg>
        </span>
        Password Protection (Optional)
      </label>
      <input id="password" name="password" type="password" placeholder="Set password to lock this file">

      <button class="btn btn-solid" type="submit">Upload Now</button>

      <div class="status-box" id="upload-status" hidden></div>

      <div class="result-box" id="upload-result" hidden>
        <p>File uploaded. Share page is ready.</p>
        <input id="result-file-link-input" type="text" readonly aria-label="Uploaded file page link">
        <div class="result-actions">
          <button class="btn btn-ghost" id="result-copy-link" type="button">Copy Link</button>
          <a class="btn btn-solid" id="result-open-page" href="#" target="_blank" rel="noopener">Open File Page</a>
        </div>
        <span id="result-file-link" hidden></span>
      </div>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
